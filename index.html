document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover\">\n<script src=\"527954c3-0060-48f4-ad41-c0cd806d1b8a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>\n  *{box-sizing:border-box}\n  html,body{width:100%;margin:0;padding:0;background:#10131c;overflow-x:hidden}\n  body{min-height:100vh;min-height:100dvh}\n  ::-webkit-scrollbar{display:none}\n  @keyframes pulseDot{0%,100%{opacity:.35}50%{opacity:1}}\n  @keyframes floatIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%;min-height:100vh;min-height:100dvh;position:relative;background:#1A2132;color:#F5EFE8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden\">\n\n  <!-- ===================== ONBOARDING ===================== -->\n  <sc-if value=\"{{ showOnboarding }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:absolute;inset:0;z-index:60;background:#1A2132;display:flex;flex-direction:column;padding:54px 22px 28px\">\n\n    <div style=\"display:flex;gap:7px;margin-bottom:30px\">\n      <sc-for list=\"{{ progress }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <div style=\"{{ p.style }}\"><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- STEP 0: WELCOME -->\n    <sc-if value=\"{{ stepWelcome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;animation:floatIn .4s ease\">\n      <div style=\"font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#E8956D;font-weight:700;margin-bottom:14px\">DermLog<\u002Fdiv>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.12;letter-spacing:-0.5px\">Track your skin.<br>Find your triggers.<\u002Fdiv>\n      <div style=\"font-size:15px;color:#B8AFA6;line-height:1.55;margin-top:16px\">A focused log for one area at a time — so the patterns behind your flares become impossible to miss.<\u002Fdiv>\n      <div style=\"margin-top:34px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"font-size:22px\">📍<\u002Fdiv><div><div style=\"font-weight:600;font-size:15px\">Pick your spot<\u002Fdiv><div style=\"font-size:13px;color:#B8AFA6;line-height:1.4\">Choose the areas that bother you most<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"font-size:22px\">✍️<\u002Fdiv><div><div style=\"font-weight:600;font-size:15px\">Log in seconds<\u002Fdiv><div style=\"font-size:13px;color:#B8AFA6;line-height:1.4\">Severity, triggers, weather &amp; photos auto-saved<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"font-size:22px\">🩺<\u002Fdiv><div><div style=\"font-weight:600;font-size:15px\">Share with your doctor<\u002Fdiv><div style=\"font-size:13px;color:#B8AFA6;line-height:1.4\">Generate a clean GP report any time<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP 1: LOCATION -->\n    <sc-if value=\"{{ stepLocation }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;animation:floatIn .35s ease;overflow-y:auto\">\n      <div style=\"font-size: 26px; font-weight: 700; line-height: 1.2; letter-spacing: -0.4px\">Where is your skin affected?<\u002Fdiv>\n      <div style=\"font-size:14px;color:#B8AFA6;line-height:1.5;margin-top:8px\">Tap one or more areas. You can always change these later.<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-top:14px\">\n        <div style=\"position:relative;width:200px;height:440px\">\n          <svg viewBox=\"0 0 200 440\" style=\"width:100%;height:100%\" xmlns=\"http://www.w3.org/2000/svg\">\n            <circle cx=\"100\" cy=\"30\" r=\"24\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fcircle>\n            <rect x=\"88\" y=\"50\" width=\"24\" height=\"16\" rx=\"6\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Frect>\n            <path d=\"M66 66 Q100 60 134 66 L128 168 Q100 178 72 168 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <path d=\"M66 70 Q46 76 42 120 L38 188 Q42 198 50 196 L56 140 Q60 100 72 86 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <path d=\"M134 70 Q154 76 158 120 L162 188 Q158 198 150 196 L144 140 Q140 100 128 86 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <ellipse cx=\"46\" cy=\"206\" rx=\"12\" ry=\"16\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fellipse>\n            <ellipse cx=\"154\" cy=\"206\" rx=\"12\" ry=\"16\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fellipse>\n            <path d=\"M72 166 Q100 178 128 166 L124 212 Q100 222 76 212 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <path d=\"M78 210 Q74 300 80 378 L90 392 Q98 388 96 356 L98 252 Q100 224 88 216 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <path d=\"M122 210 Q126 300 120 378 L110 392 Q102 388 104 356 L102 252 Q100 224 112 216 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <ellipse cx=\"84\" cy=\"400\" rx=\"13\" ry=\"9\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fellipse>\n            <ellipse cx=\"116\" cy=\"400\" rx=\"13\" ry=\"9\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fellipse>\n          <\u002Fsvg>\n          <sc-for list=\"{{ regions }}\" as=\"r\" hint-placeholder-count=\"12\">\n            <div style=\"{{ r.style }}\" onclick=\"{{ r.onSelect }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;font-size:15px;font-weight:600;margin-top:6px;min-height:22px;color:#E8956D\">{{ pickedLocationLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP 2: CONDITION -->\n    <sc-if value=\"{{ stepCondition }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;animation:floatIn .35s ease;overflow-y:auto\">\n      <div style=\"font-size:26px;font-weight:700;line-height:1.2;letter-spacing:-0.4px\">What are you tracking?<\u002Fdiv>\n      <div style=\"font-size:14px;color:#B8AFA6;line-height:1.5;margin-top:8px\">This tailors triggers and your doctor report. Not sure? That's fine.<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:18px\">\n        <sc-for list=\"{{ conditions }}\" as=\"c\" hint-placeholder-count=\"8\">\n          <div style=\"{{ c.style }}\" onclick=\"{{ c.onSelect }}\">\n            <div style=\"font-size:15px;font-weight:600\">{{ c.label }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#B8AFA6;margin-top:2px\">{{ c.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- STEP 3: BASELINE -->\n    <sc-if value=\"{{ stepBaseline }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;animation:floatIn .35s ease\">\n      <div style=\"font-size:26px;font-weight:700;line-height:1.2;letter-spacing:-0.4px\">How is your {{ pickedShortLower }} right now?<\u002Fdiv>\n      <div style=\"font-size:14px;color:#B8AFA6;line-height:1.5;margin-top:8px\">Set a starting point. This becomes your first log entry.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:24px\">\n        <sc-for list=\"{{ baselineButtons }}\" as=\"b\" hint-placeholder-count=\"4\">\n          <div style=\"{{ b.style }}\" onclick=\"{{ b.onSelect }}\">\n            <div style=\"font-size:30px;margin-bottom:8px\">{{ b.icon }}<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600\">{{ b.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- onboarding nav -->\n    <div style=\"display:flex;gap:12px;margin-top:18px\">\n      <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ onboardBack }}\" style=\"flex:0 0 auto;padding:16px 22px;border-radius:14px;border:none;background:#2A3550;color:#F5EFE8;font-size:15px;font-weight:600;cursor:pointer\">Back<\u002Fbutton>\n      <\u002Fsc-if>\n      <button onclick=\"{{ onboardNext }}\" style=\"{{ nextBtnStyle }}\">{{ nextLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== APP ===================== -->\n  <sc-if value=\"{{ showApp }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- header -->\n    <div style=\"position:sticky;top:0;z-index:40;background:rgba(26,33,50,0.96);backdrop-filter:blur(12px);padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between\">\n      <div>\n        <div style=\"font-size:17px;font-weight:600;letter-spacing:-0.3px\">DermLog<\u002Fdiv>\n        <div style=\"font-size:12px;color:#B8AFA6\">Tracking: <span style=\"color:#E8956D;font-weight:600\">{{ locationShort }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <div style=\"{{ saveStyle }}\"><div style=\"width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulseDot 1s infinite\"><\u002Fdiv><span>{{ saveText }}<\u002Fspan><\u002Fdiv>\n        <div onclick=\"{{ openDatepicker }}\" style=\"{{ dateBtnStyle }}\">📅 {{ selectedDateLabel }} ▾<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- date picker dropdown -->\n    <sc-if value=\"{{ datepickerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDatepicker }}\" style=\"position:fixed;inset:0;z-index:50\">\n      <div onclick=\"{{ stop }}\" style=\"position:absolute;top:58px;right:12px;background:#222D42;border-radius:16px;width:220px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08)\">\n        <div style=\"padding:10px 14px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#B8AFA6;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06)\">Log date<\u002Fdiv>\n        <div style=\"max-height:300px;overflow-y:auto\">\n          <sc-for list=\"{{ dateOptions }}\" as=\"d\" hint-placeholder-count=\"7\">\n            <div onclick=\"{{ d.onSelect }}\" style=\"{{ d.style }}\">\n              <div style=\"font-size:14px;font-weight:500;color:#F5EFE8\">{{ d.label }}<\u002Fdiv>\n              <sc-if value=\"{{ d.hasEntry }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:10px;background:rgba(122,158,126,0.25);border-radius:4px;padding:2px 7px;color:#7A9E7E;font-weight:600\">logged<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(255,255,255,0.06);padding:10px 14px;position:relative;cursor:pointer\">\n          <div style=\"font-size:13px;color:#B8AFA6;display:flex;align-items:center;gap:6px\"><span>📅<\u002Fspan><span>Pick any date…<\u002Fspan><\u002Fdiv>\n          <input type=\"date\" ref=\"{{ dateInputRef }}\" onchange=\"{{ onDateInput }}\" max=\"{{ todayStr }}\" style=\"position:absolute;inset:0;opacity:0;cursor:pointer\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== LOG SCREEN ===== -->\n    <sc-if value=\"{{ isLog }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:16px 16px 110px\">\n\n      <div style=\"background:#222D42;border-radius:20px;padding:20px;margin-bottom:14px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#E8956D;font-weight:600;margin-bottom:8px\">Quick Log<\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;line-height:1.25\">{{ heroQuestion }}<\u002Fdiv>\n        <div style=\"font-size:13px;color:#B8AFA6;margin-top:6px\">Everything saves automatically as you log.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- weather (compact) -->\n      <div style=\"display:flex;align-items:center;gap:8px;padding:0 4px;margin-bottom:14px;font-size:12px;color:#B8AFA6\">\n        <sc-if value=\"{{ weatherReady }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"font-size:15px\">{{ wIcon }}<\u002Fspan>\n          <span style=\"color:#7EB8D4;font-weight:600\">{{ wTemp }}<\u002Fspan>\n          <span>·<\u002Fspan><span>{{ wDesc }}<\u002Fspan>\n          <span>·<\u002Fspan><span>{{ wHumidity }}<\u002Fspan>\n\n        <\u002Fsc-if>\n        <sc-if value=\"{{ weatherLoading }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"font-style:italic\">📍 Fetching local weather…<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- exposure suggestion -->\n      <sc-if value=\"{{ showSuggestion }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:linear-gradient(135deg,rgba(122,158,126,0.13),rgba(122,158,126,0.05));border:1px solid rgba(122,158,126,0.28);border-radius:14px;padding:13px 14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start\">\n        <span style=\"font-size:20px;flex-shrink:0\">💡<\u002Fspan>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-size:13px;font-weight:600;color:#F5EFE8;margin-bottom:3px\">No exposures logged recently<\u002Fdiv>\n          <div style=\"font-size:12px;color:#B8AFA6;line-height:1.5\">Your last few entries have no triggers. Even small exposures matter — try logging some today.<\u002Fdiv>\n          <div style=\"display:flex;gap:7px;margin-top:10px;flex-wrap:wrap\">\n            <sc-for list=\"{{ suggestionChips }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ s.onAdd }}\" style=\"font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(122,158,126,0.15);border:1px solid rgba(122,158,126,0.3);color:#7A9E7E;cursor:pointer\">+ {{ s.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n            <div onclick=\"{{ dismissSuggestion }}\" style=\"font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#B8AFA6;cursor:pointer\">Dismiss<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- severity -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px\">\n        <sc-for list=\"{{ sevButtons }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"{{ s.style }}\" onclick=\"{{ s.onSelect }}\"><span style=\"font-size:20px;display:block;margin-bottom:4px\">{{ s.icon }}<\u002Fspan>{{ s.label }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- zone map -->\n      <div style=\"background:#222D42;border-radius:20px;padding:18px;margin-bottom:14px\">\n        <sc-if value=\"{{ hasLocationTabs }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto\">\n          <sc-for list=\"{{ locationTabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <div onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:14px\">{{ mapInstruction }}<\u002Fdiv>\n\n        <sc-if value=\"{{ isHandMap }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n          <div style=\"position:relative;width:200px;height:240px\">\n            <svg viewBox=\"0 0 200 240\" style=\"width:100%;height:100%\" xmlns=\"http://www.w3.org/2000/svg\">\n              <path d=\"M55 160 Q50 210 60 230 Q100 240 140 230 Q150 210 145 160 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <path d=\"M55 160 Q30 150 25 130 Q20 110 35 108 Q50 106 58 140 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <path d=\"M68 160 Q65 100 68 65 Q72 40 80 42 Q88 44 88 68 Q88 110 83 160 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <path d=\"M88 160 Q88 98 90 55 Q92 32 100 32 Q108 32 108 55 Q110 98 112 160 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <path d=\"M112 160 Q114 108 116 68 Q118 44 126 44 Q134 44 133 68 Q132 108 130 160 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <path d=\"M130 160 Q132 118 134 88 Q136 66 143 66 Q150 66 149 88 Q148 118 145 160 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <path d=\"M58 228 Q58 235 62 238 Q100 244 138 238 Q142 235 142 228 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n            <\u002Fsvg>\n            <sc-for list=\"{{ zones }}\" as=\"z\" hint-placeholder-count=\"7\">\n              <div style=\"{{ z.style }}\" onclick=\"{{ z.onToggle }}\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isFootMap }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n          <div style=\"position:relative;width:200px;height:240px\">\n            <svg viewBox=\"0 0 200 240\" style=\"width:100%;height:100%\" xmlns=\"http://www.w3.org/2000/svg\">\n              <path d=\"M100 16 Q72 18 66 64 Q60 110 70 168 Q78 214 100 218 Q122 214 130 168 Q140 110 134 64 Q128 18 100 16 Z\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.5\"><\u002Fpath>\n              <ellipse cx=\"78\" cy=\"14\" rx=\"5\" ry=\"7\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.2\"><\u002Fellipse>\n              <ellipse cx=\"90\" cy=\"11\" rx=\"5\" ry=\"7\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.2\"><\u002Fellipse>\n              <ellipse cx=\"102\" cy=\"11\" rx=\"5\" ry=\"7\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.2\"><\u002Fellipse>\n              <ellipse cx=\"114\" cy=\"13\" rx=\"5\" ry=\"7\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.2\"><\u002Fellipse>\n              <ellipse cx=\"124\" cy=\"17\" rx=\"4\" ry=\"6\" fill=\"#2A3550\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"1.2\"><\u002Fellipse>\n            <\u002Fsvg>\n            <sc-for list=\"{{ zones }}\" as=\"z\" hint-placeholder-count=\"6\">\n              <div style=\"{{ z.style }}\" onclick=\"{{ z.onToggle }}\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isRegionMap }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n          <sc-for list=\"{{ regionZones }}\" as=\"z\" hint-placeholder-count=\"6\">\n            <div style=\"{{ z.style }}\" onclick=\"{{ z.onToggle }}\">{{ z.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;gap:16px;justify-content:center;font-size:11px;color:#B8AFA6;margin-top:14px\">\n          <span style=\"display:flex;align-items:center;gap:5px\"><div style=\"width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.18)\"><\u002Fdiv>Tap once<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px\"><div style=\"width:10px;height:10px;border-radius:50%;background:#E8956D\"><\u002Fdiv>Mild<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px\"><div style=\"width:10px;height:10px;border-radius:50%;background:#D4847A\"><\u002Fdiv>Mod.<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px\"><div style=\"width:10px;height:10px;border-radius:50%;background:#ff6b6b\"><\u002Fdiv>Severe<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- daily log / exposures -->\n      <div style=\"background:#222D42;border-radius:20px;padding:18px;margin-bottom:14px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600\">Today's exposures<\u002Fdiv>\n        <div style=\"font-size:12px;color:#B8AFA6;margin:6px 0 16px\">Tap everything your skin met today — and over the past 48 hrs<\u002Fdiv>\n        <sc-for list=\"{{ triggerGroups }}\" as=\"g\" hint-placeholder-count=\"5\">\n          <div style=\"margin-bottom:16px\">\n            <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600;color:{{ g.color }}\">{{ g.icon }} {{ g.name }}<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n              <sc-for list=\"{{ g.items }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <div style=\"{{ c.style }}\" onclick=\"{{ c.onToggle }}\">{{ c.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- context -->\n      <div style=\"background:#222D42;border-radius:20px;padding:18px;margin-bottom:14px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:14px\">Context<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n          <div>\n            <label style=\"font-size:11px;color:#B8AFA6;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px\">Itch level<\u002Flabel>\n            <input type=\"range\" min=\"0\" max=\"10\" value=\"{{ itch }}\" oninput=\"{{ onItch }}\" style=\"width:100%;accent-color:#E8956D\">\n            <div style=\"font-size:13px;text-align:center;margin-top:4px;color:#E8956D\">{{ itch }}/10<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:11px;color:#B8AFA6;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px\">Sleep last night<\u002Flabel>\n            <select value=\"{{ sleep }}\" onchange=\"{{ onSleep }}\" style=\"width:100%;background:#2A3550;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#F5EFE8;padding:10px 12px;font-size:14px;-webkit-appearance:none;appearance:none\">\n              <option value=\"\">Select<\u002Foption><option>Poor (&lt;5h)<\u002Foption><option>Fair (5–7h)<\u002Foption><option>Good (7–8h)<\u002Foption><option>Great (8h+)<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:11px;color:#B8AFA6;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px\">Stress level<\u002Flabel>\n            <select value=\"{{ stress }}\" onchange=\"{{ onStress }}\" style=\"width:100%;background:#2A3550;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#F5EFE8;padding:10px 12px;font-size:14px;-webkit-appearance:none;appearance:none\">\n              <option value=\"\">Select<\u002Foption><option>Low<\u002Foption><option>Medium<\u002Foption><option>High<\u002Foption><option>Very high<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:11px;color:#B8AFA6;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px\">Blisters / weeping?<\u002Flabel>\n            <select value=\"{{ blisters }}\" onchange=\"{{ onBlister }}\" style=\"width:100%;background:#2A3550;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#F5EFE8;padding:10px 12px;font-size:14px;-webkit-appearance:none;appearance:none\">\n              <option value=\"\">Select<\u002Foption><option>No<\u002Foption><option>Yes – few<\u002Foption><option>Yes – many<\u002Foption><option>Broken/weeping<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- photos -->\n      <div style=\"background:#222D42;border-radius:20px;padding:18px;margin-bottom:14px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:4px\">Photo log<\u002Fdiv>\n        <div style=\"font-size:12px;color:#B8AFA6;margin-bottom:10px\">Capture the area to track visual changes over time<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px\">\n          <sc-for list=\"{{ photos }}\" as=\"p\" hint-placeholder-count=\"0\">\n            <div onclick=\"{{ p.onOpen }}\" style=\"aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background-color:#2A3550;background-image:url({{ p.src }});background-size:cover;background-position:center;cursor:pointer\">\n              <button onclick=\"{{ p.onRemove }}\" style=\"position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:none;color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button onclick=\"{{ openPicker }}\" style=\"aspect-ratio:1;border-radius:10px;border:2px dashed rgba(255,255,255,0.15);background:transparent;color:#B8AFA6;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px\">\n            <span style=\"font-size:22px\">📷<\u002Fspan><span>Add photo<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <input type=\"file\" accept=\"image/*\" capture=\"environment\" multiple=\"\" ref=\"{{ fileRef }}\" onchange=\"{{ onPhotoInput }}\" style=\"display:none\">\n      <\u002Fdiv>\n\n      <!-- notes -->\n      <div style=\"background:#222D42;border-radius:20px;padding:18px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:10px\">Extra notes (optional)<\u002Fdiv>\n        <textarea value=\"{{ notes }}\" oninput=\"{{ onNotes }}\" placeholder=\"Any new products, foods, events or observations…\" style=\"width:100%;background:#2A3550;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:#F5EFE8;padding:12px;font-size:14px;resize:none;font-family:inherit;min-height:80px;line-height:1.5\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== HISTORY SCREEN ===== -->\n    <sc-if value=\"{{ isHistory }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:16px 16px 110px\">\n      <div style=\"display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px\">\n        <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"7\">\n          <div style=\"{{ f.style }}\" onclick=\"{{ f.onSelect }}\">{{ f.label }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(135deg,rgba(232,149,109,0.1),rgba(212,132,122,0.08));border:1px solid rgba(232,149,109,0.2);border-radius:12px;padding:12px 14px;font-size:12px;color:#B8AFA6;line-height:1.5;margin-bottom:14px\">\n        <strong style=\"color:#E8956D\">⏱ Exposure window:<\u002Fstrong> Contact reactions appear <strong style=\"color:#E8956D\">24–48 hrs<\u002Fstrong> after re-exposure; first-time sensitisation can take <strong style=\"color:#E8956D\">5–7 days<\u002Fstrong>. Look 1–2 days <em>before<\u002Fem> a flare to spot its cause.\n      <\u002Fdiv>\n      <sc-if value=\"{{ historyEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center;padding:50px 20px;color:#B8AFA6\"><div style=\"font-size:48px;margin-bottom:14px;opacity:0.4\">🔍<\u002Fdiv><div style=\"font-size:16px;font-weight:600;color:#F5EFE8;margin-bottom:6px\">No entries match<\u002Fdiv><div>Try a different filter<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-for list=\"{{ entries }}\" as=\"e\" hint-placeholder-count=\"4\">\n        <div style=\"background:#222D42;border-radius:16px;padding:16px;margin-bottom:10px;border-left:3px solid {{ e.sevColor }}\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n            <div>\n              <div style=\"font-size:15px;font-weight:600;margin-bottom:2px\">{{ e.dateStr }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#B8AFA6\">{{ e.metaStr }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;background:#2A3550;color:{{ e.sevColor }}\">{{ e.sevLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ e.hasZones }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:11px;color:#B8AFA6;margin-top:8px\">📍 {{ e.zoneStr }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ e.hasTriggers }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:10px\">\n              <sc-for list=\"{{ e.chips }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"font-size:11px;padding:3px 9px;border-radius:10px;background:#2A3550;color:#B8AFA6\">{{ c }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ e.hasWeather }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:11px;color:#7EB8D4;margin-top:8px\">{{ e.weatherStr }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ e.hasPhotos }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:10px\">\n              <div style=\"font-size:11px;color:#B8AFA6;margin-bottom:6px;display:flex;align-items:center;gap:5px\">\n                <span>📷<\u002Fspan><span>{{ e.photoCount }} photo{{ e.photoCountPlural }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:7px;overflow-x:auto;padding-bottom:2px\">\n                <sc-for list=\"{{ e.photos }}\" as=\"p\" hint-placeholder-count=\"0\">\n                  <div onclick=\"{{ p.onOpen }}\" style=\"width:72px;height:72px;border-radius:10px;background-color:#2A3550;background-image:url({{ p.src }});background-size:cover;background-position:center;flex-shrink:0;cursor:pointer;border:1.5px solid rgba(255,255,255,0.08)\"><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ e.hasNotes }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:12px;color:#B8AFA6;margin-top:8px;font-style:italic\">{{ e.notesStr }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== PATTERNS SCREEN ===== -->\n    <sc-if value=\"{{ isPatterns }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:16px 16px 110px\">\n      <sc-if value=\"{{ patternsEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center;padding:50px 20px;color:#B8AFA6\"><div style=\"font-size:48px;margin-bottom:14px;opacity:0.4\">📊<\u002Fdiv><div style=\"font-size:16px;font-weight:600;color:#F5EFE8;margin-bottom:6px\">Not enough data yet<\u002Fdiv><div>Log a few entries to see patterns<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ patternsReady }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px\"><span style=\"font-size:18px\">📊<\u002Fspan>Last 7 Days<\u002Fdiv>\n          <div style=\"display:flex;gap:5px\">\n            <sc-for list=\"{{ days7 }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n                <div style=\"width:100%;height:36px;border-radius:6px;background:#2A3550;display:flex;align-items:flex-end;overflow:hidden\"><div style=\"{{ d.fill }}\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:9px;color:#B8AFA6\">{{ d.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px\">\n          <div style=\"background:#222D42;border-radius:12px;padding:14px 10px;text-align:center\"><div style=\"font-size:26px;font-weight:700;color:#E8956D\">{{ statFlares }}<\u002Fdiv><div style=\"font-size:10px;color:#B8AFA6;margin-top:3px;text-transform:uppercase;letter-spacing:0.6px\">Flares<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#222D42;border-radius:12px;padding:14px 10px;text-align:center\"><div style=\"font-size:26px;font-weight:700;color:#E8956D\">{{ statAvg }}<\u002Fdiv><div style=\"font-size:10px;color:#B8AFA6;margin-top:3px;text-transform:uppercase;letter-spacing:0.6px\">Avg severity<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#222D42;border-radius:12px;padding:14px 10px;text-align:center\"><div style=\"font-size:26px;font-weight:700;color:#E8956D\">{{ statClear }}<\u002Fdiv><div style=\"font-size:10px;color:#B8AFA6;margin-top:3px;text-transform:uppercase;letter-spacing:0.6px\">Clear days<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px\"><span style=\"font-size:18px\">🎯<\u002Fspan>Top Triggers<\u002Fdiv>\n          <sc-for list=\"{{ topTriggers }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:9px\">\n              <div style=\"font-size:12px;color:#B8AFA6;width:104px;flex-shrink:0\">{{ t.label }}<\u002Fdiv>\n              <div style=\"flex:1;height:8px;background:#2A3550;border-radius:4px;overflow:hidden\"><div style=\"{{ t.fill }}\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:11px;color:#B8AFA6;width:24px;text-align:right\">{{ t.count }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ insights }}\" as=\"i\" hint-placeholder-count=\"2\">\n          <div style=\"background:linear-gradient(135deg,rgba(122,158,126,0.12),rgba(122,158,126,0.06));border:1px solid rgba(122,158,126,0.25);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.5\"><span style=\"margin-right:6px\">{{ i.icon }}<\u002Fspan>{{ i.text }}<\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px\"><span style=\"font-size:18px\">🕐<\u002Fspan>Exposure Timeline<\u002Fdiv>\n          <div style=\"font-size:13px;color:#B8AFA6;line-height:1.7\">\n            <p style=\"margin:0 0 8px\"><strong style=\"color:#F5EFE8\">Known allergen (re-exposure)<\u002Fstrong> → reaction in <strong style=\"color:#E8956D\">24–48 hours<\u002Fstrong><\u002Fp>\n            <p style=\"margin:0 0 8px\"><strong style=\"color:#F5EFE8\">First-time allergen exposure<\u002Fstrong> → reaction in <strong style=\"color:#E8956D\">5–7 days<\u002Fstrong><\u002Fp>\n            <p style=\"margin:0\"><strong style=\"color:#F5EFE8\">Chlorine / wet work<\u002Fstrong> → barrier damage; flare in <strong style=\"color:#E8956D\">hours to next day<\u002Fstrong><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== REPORT SCREEN ===== -->\n    <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:16px 16px 110px\">\n      <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:6px\">GP Report<\u002Fdiv>\n        <div style=\"font-size:13px;color:#B8AFA6;line-height:1.5;margin-bottom:14px\">Generate a summary to share with your doctor or dermatologist.<\u002Fdiv>\n        <sc-for list=\"{{ reportOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer\" onclick=\"{{ o.onClick }}\">\n            <div style=\"width:44px;height:44px;border-radius:12px;background:rgba(232,149,109,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0\">{{ o.icon }}<\u002Fdiv>\n            <div><strong style=\"display:block;font-size:15px;margin-bottom:2px\">{{ o.title }}<\u002Fstrong><span style=\"font-size:12px;color:#B8AFA6\">{{ o.sub }}<\u002Fspan><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#B8AFA6;font-size:16px\">›<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:14px\">About your condition<\u002Fdiv>\n        <div style=\"font-size:13px;color:#B8AFA6;line-height:1.7\">\n          <sc-for list=\"{{ aboutParas }}\" as=\"a\" hint-placeholder-count=\"3\">\n            <p style=\"margin:0 0 10px\"><strong style=\"color:{{ a.color }}\">{{ a.label }}<\u002Fstrong> {{ a.text }}<\u002Fp>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ onRestart }}\" style=\"width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#B8AFA6;font-size:14px;font-weight:600;cursor:pointer\">⟲ Change tracked area<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SETTINGS SCREEN ===== -->\n    <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:16px 16px 110px\">\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:-0.4px;margin:4px 4px 16px\">Settings<\u002Fdiv>\n\n      <!-- account -->\n      <div style=\"background:#222D42;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#E8956D,#D4847A);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0\">{{ accountInitial }}<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-size:17px;font-weight:600\">{{ accountName }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#B8AFA6;margin-top:2px\">Tracking {{ locationShort }} · {{ conditionLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onRestart }}\" style=\"background:#2A3550;border:none;color:#B8AFA6;font-size:12px;padding:8px 14px;border-radius:20px;cursor:pointer;font-weight:600;flex-shrink:0\">Change area<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- integrations -->\n      <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:14px\">Health integrations<\u002Fdiv>\n\n        <!-- no integrations yet: setup card -->\n        <sc-if value=\"{{ noIntegrations }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#2A3550;border-radius:14px;padding:16px;display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"width:44px;height:44px;border-radius:12px;background:rgba(232,149,109,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0\">⌚<\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-size:15px;font-weight:600;margin-bottom:4px\">Connect a wearable<\u002Fdiv>\n            <div style=\"font-size:12px;color:#B8AFA6;line-height:1.5;margin-bottom:14px\">Auto-fill sleep, stress and activity from Apple Watch, Oura or Garmin each time you log.<\u002Fdiv>\n            <button onclick=\"{{ openIntegrationSetup }}\" style=\"padding:10px 20px;border-radius:10px;border:none;background:#E8956D;color:#fff;font-size:14px;font-weight:600;cursor:pointer\">Set up now<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- connected integrations list -->\n        <sc-if value=\"{{ hasIntegrations }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-for list=\"{{ connectedIntegrations }}\" as=\"i\" hint-placeholder-count=\"1\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)\">\n            <div style=\"width:40px;height:40px;border-radius:11px;background:#2A3550;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0\">{{ i.icon }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:15px;font-weight:600\">{{ i.name }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#7A9E7E;margin-top:2px\">● Connected · syncing<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ i.onDisconnect }}\" style=\"background:transparent;border:1px solid rgba(255,255,255,0.12);color:#B8AFA6;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;font-weight:500\">Remove<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <button onclick=\"{{ openIntegrationSetup }}\" style=\"margin-top:12px;width:100%;padding:11px;border-radius:10px;border:1.5px dashed rgba(232,149,109,0.35);background:transparent;color:#E8956D;font-size:14px;font-weight:600;cursor:pointer\">+ Add integration<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- notifications -->\n      <div style=\"background:#222D42;border-radius:16px;padding:8px 18px 14px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin:12px 0 2px\">Notifications<\u002Fdiv>\n        <sc-for list=\"{{ toggles }}\" as=\"t\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 0\">\n            <div style=\"flex:1;padding-right:14px\"><div style=\"font-size:15px;font-weight:500\">{{ t.label }}<\u002Fdiv><div style=\"font-size:12px;color:#B8AFA6;margin-top:2px\">{{ t.desc }}<\u002Fdiv><\u002Fdiv>\n            <div onclick=\"{{ t.onToggle }}\" style=\"{{ t.trackStyle }}\"><div style=\"{{ t.knobStyle }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- manage exposures -->\n      <div style=\"background:#222D42;border-radius:16px;padding:8px 18px 16px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin:12px 0 6px\">My exposures<\u002Fdiv>\n        <div style=\"font-size:13px;color:#B8AFA6;line-height:1.5;margin-bottom:12px\">Customise which exposures appear in your daily log. Add your own or hide ones that don't apply.<\u002Fdiv>\n        <div onclick=\"{{ openManageExposures }}\" style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:#2A3550;cursor:pointer\">\n          <span style=\"font-size:20px\">✏️<\u002Fspan>\n          <div style=\"flex:1\">\n            <div style=\"font-size:15px;font-weight:500\">Manage exposures<\u002Fdiv>\n            <div style=\"font-size:12px;color:#B8AFA6;margin-top:2px\">{{ activeExposureCount }} active · {{ customExposureCount }} custom<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"color:#B8AFA6;font-size:16px\">›<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- data & privacy -->\n      <div style=\"background:#222D42;border-radius:16px;padding:8px 18px 14px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin:12px 0 2px\">Data &amp; privacy<\u002Fdiv>\n        <sc-for list=\"{{ dataRows }}\" as=\"d\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ d.onClick }}\" style=\"display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer\">\n            <div style=\"width:40px;height:40px;border-radius:10px;background:#2A3550;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0\">{{ d.icon }}<\u002Fdiv>\n            <div style=\"flex:1\"><div style=\"font-size:15px;font-weight:500;color:{{ d.color }}\">{{ d.label }}<\u002Fdiv><div style=\"font-size:12px;color:#B8AFA6;margin-top:1px\">{{ d.sub }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"color:#B8AFA6;font-size:16px\">›<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- about -->\n      <div style=\"background:#222D42;border-radius:16px;padding:18px;margin-bottom:12px\">\n        <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#B8AFA6;font-weight:600;margin-bottom:10px\">About<\u002Fdiv>\n        <div style=\"font-size:13px;color:#B8AFA6;line-height:1.6\">DermLog v1.0 · Made with care for sensitive skin.<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8a8079;line-height:1.6;margin-top:10px\">DermLog is a personal tracking aid, not a medical device or a substitute for professional diagnosis. Always consult a qualified healthcare professional about your skin.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- bottom nav -->\n    <div style=\"position:fixed;bottom:0;left:0;right:0;background:rgba(26,33,50,0.97);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:8px 0 env(safe-area-inset-bottom,20px);z-index:40\">\n      <sc-for list=\"{{ bottomNav }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ n.onClick }}\" style=\"{{ n.style }}\"><span style=\"font-size:20px;line-height:1\">{{ n.icon }}<\u002Fspan>{{ n.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== REPORT MODAL ===== -->\n  <sc-if value=\"{{ reportOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <div onclick=\"{{ closeReport }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center\">\n    <div onclick=\"{{ stop }}\" style=\"background:#222D42;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-height:85vh;overflow-y:auto\">\n      <div style=\"width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 20px\"><\u002Fdiv>\n      <div style=\"font-size:18px;font-weight:700;margin-bottom:6px\">GP Report<\u002Fdiv>\n      <div style=\"font-size:13px;color:#B8AFA6;margin-bottom:18px\">{{ reportSubtitle }}<\u002Fdiv>\n      <div style=\"background:#1A2132;border-radius:10px;padding:16px;font-size:12px;line-height:1.7;color:#B8AFA6;max-height:46vh;overflow-y:auto;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06)\">\n        <sc-for list=\"{{ reportSections }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"margin-bottom:14px\">\n            <div style=\"color:#F5EFE8;font-size:13px;font-weight:600;margin-bottom:6px\">{{ s.title }}<\u002Fdiv>\n            <sc-for list=\"{{ s.lines }}\" as=\"l\" hint-placeholder-count=\"2\">\n              <div style=\"margin-bottom:3px\">{{ l }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px\">\n        <button onclick=\"{{ closeReport }}\" style=\"flex:1;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#2A3550;color:#F5EFE8\">Close<\u002Fbutton>\n        <button onclick=\"{{ copyReport }}\" style=\"flex:1;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#E8956D;color:#fff\">Copy Report<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== INTEGRATION SETUP MODAL ===== -->\n  <sc-if value=\"{{ integrationSetupOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <div onclick=\"{{ closeIntegrationSetup }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:flex-end;justify-content:center\">\n    <div onclick=\"{{ stop }}\" style=\"background:#222D42;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-height:80vh;overflow-y:auto\">\n      <div style=\"width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 20px\"><\u002Fdiv>\n      <div style=\"font-size:18px;font-weight:700;margin-bottom:4px\">Connect a wearable<\u002Fdiv>\n      <div style=\"font-size:13px;color:#B8AFA6;margin-bottom:20px\">Choose        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;gap:10px\">\n        <button onclick=\"{{ closeIntegrationSetup }}\" style=\"flex:1;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#2A3550;color:#F5EFE8\">Cancel<\u002Fbutton>\n        <button onclick=\"{{ connectIntegration }}\" style=\"{{ connectBtnStyle }}\">Connect {{ setupDeviceName }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== MANAGE EXPOSURES MODAL ===== -->\n  <sc-if value=\"{{ manageExposuresOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <div onclick=\"{{ closeManageExposures }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:flex-end;justify-content:center\">\n    <div onclick=\"{{ stop }}\" style=\"background:#222D42;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-height:88vh;overflow-y:auto\">\n      <div style=\"width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 20px\"><\u002Fdiv>\n      <div style=\"font-size:18px;font-weight:700;margin-bottom:4px\">My exposures<\u002Fdiv>\n      <div style=\"font-size:13px;color:#B8AFA6;margin-bottom:20px\">Tap to enable or disable. Disabled exposures won't appear in your daily log.<\u002Fdiv>\n      <sc-for list=\"{{ exposureMgmtGroups }}\" as=\"g\" hint-placeholder-count=\"5\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:{{ g.color }};margin-bottom:8px\">{{ g.icon }} {{ g.name }}<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n            <sc-for list=\"{{ g.items }}\" as=\"i\" hint-placeholder-count=\"5\">\n              <div onclick=\"{{ i.onToggle }}\" style=\"{{ i.style }}\">{{ i.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n  or allergen — ranging from household chemicals to fragrances and metals.'},{label:'Patch testing:',color:AMBER,text:'If a specific allergen is suspected, ask your GP about referral for patch testing.'},{label:'Tracking tip:',color:SAGE,text:'Log everything that touched the area in the 48 hrs before a reaction.'}],\n  psoriasis:[{label:'Psoriasis.',color:CREAM,text:'An immune-mediated condition causing thick, scaly plaques, often on extensor surfaces.'},{label:'Triggers:',color:AMBER,text:'Stress, infection, skin injury and some medications can drive flares.'},{label:'Tracking tip:',color:SAGE,text:'Track stress and illness alongside flares to spot your personal drivers.'}],\n  hives:[{label:'Hives (urticaria).',color:CREAM,text:'Raised, itchy welts that appear and resolve, sometimes within hours.'},{label:'Triggers:',color:AMBER,text:'Foods, medications, heat, pressure and stress are common provokers.'},{label:'Tracking tip:',color:SAGE,text:'Note food and activity in the hours before an outbreak — timing is key.'}],\n  rosacea:[{label:'Rosacea.',color:CREAM,text:'Facial redness, flushing and bumps, typically on the central face.'},{label:'Triggers:',color:AMBER,text:'Heat, sun, alcohol, spicy food and stress commonly trigger flushing.'},{label:'Tracking tip:',color:SAGE,text:'Diet and weather columns are especially useful for rosacea.'}],\n  acne:[{label:'Acne.',color:CREAM,text:'Spots and congestion from blocked, inflamed follicles.'},{label:'Triggers:',color:AMBER,text:'Hormonal cycles, certain products and diet can influence breakouts.'},{label:'Tracking tip:',color:SAGE,text:'Track menstrual cycle and new products to spot correlations.'}],\n  other:[{label:'Symptom tracking.',color:CREAM,text:'You\\u2019re logging symptoms to find patterns before a diagnosis.'},{label:'Why it helps:',color:AMBER,text:'A clear timeline of severity, triggers and photos makes your next appointment far more productive.'},{label:'Tracking tip:',color:SAGE,text:'Be consistent — even
